name: BidIntelligenceOS CI

on:
  push:
    branches:
      - main
      - feat/bidos-production-2026-07
  pull_request:
    branches:
      - main
      - feat/bidos-production-2026-07

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Audit-Risk-Model (sibling for @workspace/cca-core)
        run: git clone --depth 1 "https://github.com/contractorcomplianceco-cmyk/Audit-Risk-Model.git" ../Audit-Risk-Model

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run check:security
      - run: npm run smoke:dry-run
