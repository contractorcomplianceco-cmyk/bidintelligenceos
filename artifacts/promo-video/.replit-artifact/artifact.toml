kind = "video"
previewPath = "/promo/"
title = "BidIntelligenceOS + VoiceConnect Film"
version = "1.0.0"
id = "artifacts/promo-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/promo/" ]
localPort = 22228

[services.development]
run = "pnpm --filter @workspace/promo-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promo-video", "run", "build" ]
publicDir = "artifacts/promo-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22228"
BASE_PATH = "/promo/"
