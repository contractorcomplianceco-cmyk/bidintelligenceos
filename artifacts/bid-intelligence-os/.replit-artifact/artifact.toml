kind = "web"
previewPath = "/"
title = "CCA BidIntelligenceOS"
version = "1.0.0"
id = "artifacts/bid-intelligence-os"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25663

[services.development]
run = "pnpm --filter @workspace/bid-intelligence-os run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bid-intelligence-os", "run", "build" ]
publicDir = "artifacts/bid-intelligence-os/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25663"
BASE_PATH = "/"
